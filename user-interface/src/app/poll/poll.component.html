<div class="container my-5">
  <div class="theme-toggle">
    <label class="form-check form-switch">
      <input
        class="form-check-input"
        type="checkbox"
        (change)="toggleTheme()"
      />
      <span class="form-check-label">Dark Mode</span>
    </label>
  </div>

  <!-- Header -->
  <h2 class="text-center mb-4">Create a New Poll</h2>

  <!-- Create Poll Form -->
  <form (ngSubmit)="createPoll()" #pollForm="ngForm" novalidate>
    <!-- Poll Question -->
    <div class="mb-4">
      <label for="question" class="form-label fw-bold">Poll Question</label>
      <input
        type="text"
        id="question"
        class="form-control"
        [(ngModel)]="newPoll.question"
        name="question"
        required
        placeholder="Enter your poll question here"
        aria-describedby="questionHelp"
      />
      <div id="questionHelp" class="form-text">Be clear and concise.</div>
    </div>

    <!-- Poll Options -->
    <div class="mb-4">
      <label class="form-label fw-bold">Options</label>

      <div
        *ngFor="let option of newPoll.options; let i = index"
        class="input-group mb-2"
      >
        <span class="input-group-text">Option {{ i + 1 }}</span>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="option.optionText"
          [name]="'option' + i"
          required
          placeholder="Enter option text"
        />
        <button
          *ngIf="newPoll.options.length > 2"
          type="button"
          class="btn btn-outline-danger"
          (click)="removeOption(i)"
          aria-label="Remove this option"
        >
          Remove
        </button>
      </div>
    </div>

    <!-- Form Buttons -->
    <div class="d-flex gap-3 mb-5">
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="addOption()"
      >
        + Add Option
      </button>
      <button
        type="submit"
        class="btn btn-success"
        [disabled]="!pollForm.form.valid"
      >
        ✅ Create Poll
      </button>
    </div>
  </form>

  <!-- Divider -->
  <hr class="my-5" />

  <!-- Available Polls Section -->
  <h2 class="text-center mb-4">Available Polls</h2>

  <div class="polls-list">
    <div *ngFor="let poll of polls" class="card mb-4 shadow-sm">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="card-title mb-0">{{ poll.question }}</h5>
          <button
            type="button"
            class="btn btn-sm btn-outline-danger"
            (click)="delete(poll.id)"
          >
            🗑️ Delete
          </button>
        </div>

        <div class="d-flex flex-wrap gap-2">
          <button
            *ngFor="let option of poll.options; let i = index"
            (click)="vote(poll.id, i)"
            class="btn btn-outline-primary"
          >
            {{ i + 1 }}. {{ option.optionText }} ({{ option.voteCount }} votes)
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
